general {
  # grace = 3
  # ignore_empty_input = true
  immediate_render = true
  hide_cursor = true 
}

background {
  monitor =
  path = ~/Pictures/Wallpapers/Path.jpg 
  # color = rgba(25, 20, 20, 1.0)
  blur_passes = 3
}

input-field {
  monitor =
  size = 200, 50
  outline_thickness = 3
  dots_size = 0.33
  dots_spacing = 0.15
  dots_center = true
  outer_color = rgb(151515)
  inner_color = rgb(200, 200, 200)
  font_color = rgb(10, 10, 10)
  fade_on_empty = true
  placeholder_text = <i>Input Password...</i>
  hide_input = false
  position = 0, -20
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  color = rgba(200, 200, 200, 1.0)
  font_size = 64
  position = 0, 80
  halign = center
  valign = center
}
